[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "MatlyPy"
version = "0.1.4"
authors = [{ name="Akshay SIngh", email="limesuggestbox360@gmail.com" }]
description = "A small library that mixes the use of numpy & matplotlib. It also makes creating AI models easier."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "matplotlib"
]

[tool.setuptools.packages.find]
where = ["src"]